name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download ktlint
        run: |
          curl -sSfL https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint -o ktlint
          chmod +x ktlint

      - name: Run ktlint
        run: ./ktlint "manager/src/**/*.kt" "worker/src/**/*.kt" "common/src/**/*.kt"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw manager/mvnw worker/mvnw

      - name: Run tests
        run: ./mvnw -B test
